<!doctype html>
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="icon.png" />
  <title>Copy Tabs - Options</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      padding: 0;
      margin: 0;
      color: light-dark(black, white);
      background-color: light-dark(white, black);
    }
    #allowedParams {
      color: light-dark(black, white);
      background-color: light-dark(white, black);
      height: 40em;
      resize: vertical;
      white-space: pre-wrap;
      width: 99%;
    }
    button {
      color: light-dark(black, black);
      background-color: light-dark(white, gainsboro);
      padding: 3px;
      margin: 5px;
    }
    button:hover {
      background-color: light-dark(gainsboro, white);
    }
  </style>
</head>
<body>
  <fieldset>
    <b>Toolbar button</b>: Swap
    <abbr title="Left Mouse Button"><b>LMB</b></abbr> and
    <abbr title="Middle Mouse Button"><b>MMB</b></abbr> actions
    <input type="checkbox" id="popupmode" />
    <abbr
      title="unchecked: LMB: shows popup and MMB: invokes the immediate action"
      >(?)</abbr
    >
  </fieldset>

  <fieldset>
    <b>Clean Copy Exceptions (aka. allow parameters for hosts)</b><br />
    <pre>
# Examples:
  mozilla.org utm_source utm_medium
  w3c.org page lang
</pre
    >
    <textarea spellcheck="false" id="allowedParams"></textarea>
  </fieldset>

  <script src="options.js"></script>
</body>
